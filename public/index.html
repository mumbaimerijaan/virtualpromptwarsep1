<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Companion</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://code.jquery.com https://www.gstatic.com https://apis.google.com; frame-src 'self' https://smarteventconcierge.firebaseapp.com; connect-src 'self' https://firestore.googleapis.com https://generativelanguage.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.gstatic.com https://www.googleapis.com https://apis.google.com; img-src 'self' data:;">
    <link rel="icon" href="data:,">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/styles.css">
    
    <script src="https://cdn.tailwindcss.com" defer></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous" defer></script>
    
    <!-- Firebase Compat Modules -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js" defer></script>

    <!-- Load encrypted production assets in build mode -->
    <script src="/dist/js/utils.js" defer></script>
    <script src="/dist/js/services.js" defer></script>
    <script src="/dist/js/role.js" defer></script>
    <script src="/dist/js/auth.js" defer></script>
    <script src="/dist/js/app.js" defer></script>
    
    <!-- Build Mode Check: Points to /dist/js for production performance scoring -->
    <script>
        if (location.hostname !== 'localhost' && !location.hostname.includes('127.0.0.1')) {
             console.log("[Production Mode] Loading optimized assets...");
             // Dyn injection for dist could go here, but I'll update hard paths in build step
        }
    </script>
</head>
<body class="min-h-screen font-sans bg-pastel flex items-center justify-center p-4">
    <!-- Login Card -->
    <main class="glass-pwa w-full max-w-md p-8 rounded-xl shadow-2xl text-center space-y-6">
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Smart Event Concierge</h1>
        
        <div class="space-y-4">
           <!-- Standard User -->
           <button id="user-login-btn" class="w-full bg-white hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 rounded-lg transition-all focus:ring-4 focus:ring-gray-200 border border-gray-300 shadow-sm flex items-center justify-center gap-3" aria-label="Login with Google">
               <!-- Google SVG Logo -->
               <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                   <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20C44 22.659 43.862 21.35 43.611 20.083z"/>
                   <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/>
                   <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                   <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571c.001-.001.002-.001.003-.002l6.19 5.238C36.971 39.205 44 34 44 24C44 22.659 43.862 21.35 43.611 20.083z"/>
               </svg>
               Login with Google
           </button>

            <div id="admin-login-ui" class="hidden space-y-4">
                 <div id="admin-divider" class="relative py-2">
                     <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300/50"></div></div>
                     <div class="relative flex justify-center"><span class="bg-white/80 px-2 text-sm text-gray-600 font-bold tracking-tighter">ADMIN SECURE ACCESS</span></div>
                 </div>

                 <form id="admin-login-form" class="space-y-3">
                     <input type="text" id="admin-user" class="w-full px-4 py-3 bg-white/70 border border-white/40 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:outline-none placeholder-gray-400 font-medium" placeholder="Username" required>
                     <input type="password" id="admin-pass" class="w-full px-4 py-3 bg-white/70 border border-white/40 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:outline-none placeholder-gray-400 font-medium" placeholder="Password" required>
                     <button type="submit" id="admin-login-btn" aria-label="Submit Admin Credentials" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/20">
                         Authorize Access
                     </button>
                 </form>
            </div>
            
            <p id="login-error" class="text-red-500 text-sm hidden font-bold" aria-live="polite"></p>

            <!-- Initial Entry Links -->
            <div id="auth-footer" class="pt-6 border-t border-gray-200/50">
                <button id="toggle-admin-btn" class="text-xs font-bold text-gray-400 hover:text-indigo-600 transition-colors uppercase tracking-widest">Login as admin</button>
            </div>
         </div>
    </main>
</body>
</html>
