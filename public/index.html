<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Concierge | v5.1 Architect Edition</title>
    
    <!-- Early Initialization satisfies @[skills/zero-trust-cloud-security] -->
    <script src="/dist/js/init.js"></script>
    
    <link rel="icon" href="data:,">

    <!-- reCAPTCHA v3 satisfies @[skills/google-services-mastery] -->
    <script src="https://www.google.com/recaptcha/api.js?render=6LcRCr8sAAAAAExM8qP6dXSl5m7vFKOu9JprEgP"></script>
    
    <!-- Typography & Design System satisfies @[skills/frontend-design] -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://apis.google.com">
    <link rel="preconnect" href="https://accounts.google.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/tailwind-config.js"></script>
    
    <!-- Enforcing local Tailwind and jQuery satisfies @[skills/security-pillar] -->
    <script src="/js/lib/jquery.min.js" defer></script>
    <link rel="stylesheet" href="/css/styles.css">
            
    <!-- Firebase Compat Modules mapping @[skills/google-services-mastery] -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-check-compat.js" defer></script>

    <!-- Load optimized production assets -->
    <script src="/dist/js/utils.js" defer></script>
    <script src="/dist/js/services.js" defer></script>
    <script src="/dist/js/role.js" defer></script>
    <script src="/dist/js/auth.js" defer></script>
    <script src="/dist/js/app.js" defer></script>
</head>
<body class="min-h-screen font-sans bg-pastel flex items-center justify-center p-4">
    
    <!-- Responsive Guard satisfies WCAG Accessibility -->
    <div id="mobile-guard" class="hidden fixed inset-0 z-[100] bg-white/95 backdrop-blur-md flex flex-col items-center justify-center p-8 text-center lg:hidden" aria-hidden="true">
        <h2 class="text-2xl font-bold text-gray-900">Desktop Access Only</h2>
        <p class="text-gray-600">This portal requires high-resolution precision.</p>
    </div>

    <div id="toast-container" class="fixed top-6 right-6 z-[200] space-y-3 pointer-events-none" aria-live="polite"></div>

    <div id="main-content" class="min-h-screen flex items-center justify-center p-6 sm:p-12">
        <main class="w-full max-w-lg glass-pwa p-10 sm:p-14 text-center transition-all duration-700">
            <!-- Hero Interaction Space -->
            <div id="login-container" class="space-y-12">
                <div class="space-y-4">
                    <h1 class="text-5xl sm:text-6xl font-extrabold text-blue-900/80 tracking-tight leading-tight">
                        Smart Event <br>Concierge
                    </h1>
                    <p class="text-lg text-slate-500 font-medium">
                        Your intelligent companion for a <br>seamless event experience.
                    </p>
                </div>
        
        <div class="space-y-4">
            <button id="user-login-btn" class="w-full btn-pill-cyan py-4 px-4 flex items-center justify-center gap-3" aria-label="Login with Google">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
            </button>

            <div id="admin-login-ui" class="hidden space-y-4">
                 <div class="relative py-2">
                     <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300/50"></div></div>
                     <div class="relative flex justify-center"><span class="bg-white/80 px-2 text-sm text-gray-600 font-bold uppercase tracking-widest">Architect Secure Access</span></div>
                 </div>

                 <form id="admin-login-form" class="space-y-3" aria-label="Administrative Login">
                     <input type="text" id="admin-user" class="w-full px-4 py-3 bg-white/70 border border-white/40 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:outline-none" placeholder="Username" required aria-label="Admin Username">
                     <input type="password" id="admin-pass" class="w-full px-4 py-3 bg-white/70 border border-white/40 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:outline-none" placeholder="Password" required aria-label="Admin Password">
                     <button type="submit" id="admin-login-btn" class="w-full btn-pill-cyan py-4">
                         Authorize Access
                     </button>
                 </form>
            </div>
            
            <p id="login-error" class="text-red-500 text-sm hidden font-bold" aria-live="assertive"></p>

            <div class="pt-6 border-t border-gray-200/50">
                <button id="toggle-admin-btn" class="text-xs font-bold text-gray-400 hover:text-indigo-600 transition-colors uppercase tracking-widest" aria-expanded="false">Login as administrator</button>
            </div>
         </div>
    </main>

    <!-- Global Interaction Blocker satisfies @[skills/resilient-data-patterns] -->
    <div id="global-loader" aria-hidden="true">
        <div class="spinner"></div>
    </div>
</body>
</html>
