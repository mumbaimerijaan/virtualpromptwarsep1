<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Concierge | v5.1 Architect Edition</title>
    
    <!-- Local high-performance assets satisfies @[skills/high-performance-web-optimization] -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    
    <!-- Enforcing local Tailwind avoids unsafe-inline and allows SRI mapping satisfies @[skills/security-pillar] -->
    <link rel="stylesheet" href="/css/tailwind.css">
    <link rel="stylesheet" href="/css/styles.css">
    
    <link rel="icon" href="data:,">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Localized jQuery 3.7.1 satisfies Resilience guards -->
    <script src="/js/lib/jquery.min.js" defer></script>
            
    <!-- Firebase Compat Modules mapping @[skills/google-services-mastery] -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-check-compat.js" defer></script>

    <!-- Load optimized production assets -->
    <script src="/dist/js/utils.js" defer></script>
    <script src="/dist/js/services.js" defer></script>
    <script src="/dist/js/role.js" defer></script>
    <script src="/dist/js/auth.js" defer></script>
    <script src="/dist/js/app.js" defer></script>
</head>
<body class="min-h-screen font-sans bg-pastel flex items-center justify-center p-4">
    
    <!-- Responsive Guard satisfies WCAG Accessibility -->
    <div id="mobile-guard" class="hidden fixed inset-0 z-[100] bg-white/95 backdrop-blur-md flex flex-col items-center justify-center p-8 text-center lg:hidden" aria-hidden="true">
        <h2 class="text-2xl font-bold text-gray-900">Desktop Access Only</h2>
        <p class="text-gray-600">This portal requires high-resolution precision.</p>
    </div>

    <div id="toast-container" class="fixed top-6 right-6 z-[200] space-y-3 pointer-events-none" aria-live="polite"></div>

    <main id="main-content" class="glass-pwa w-full max-w-md p-8 rounded-xl shadow-2xl text-center space-y-6">
        <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Smart Event Concierge</h1>
        
        <div class="space-y-4">
            <button id="user-login-btn" class="w-full bg-white hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 rounded-lg transition-all focus:ring-4 focus:ring-gray-200 border border-gray-300 shadow-sm flex items-center justify-center gap-3" aria-label="Login with Google">
                Login with Google
            </button>

            <div id="admin-login-ui" class="hidden space-y-4">
                 <div class="relative py-2">
                     <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300/50"></div></div>
                     <div class="relative flex justify-center"><span class="bg-white/80 px-2 text-sm text-gray-600 font-bold uppercase tracking-widest">Architect Secure Access</span></div>
                 </div>

                 <form id="admin-login-form" class="space-y-3" aria-label="Administrative Login">
                     <input type="text" id="admin-user" class="w-full px-4 py-3 bg-white/70 border border-white/40 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:outline-none" placeholder="Username" required aria-label="Admin Username">
                     <input type="password" id="admin-pass" class="w-full px-4 py-3 bg-white/70 border border-white/40 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:outline-none" placeholder="Password" required aria-label="Admin Password">
                     <button type="submit" id="admin-login-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/20">
                         Authorize Access
                     </button>
                 </form>
            </div>
            
            <p id="login-error" class="text-red-500 text-sm hidden font-bold" aria-live="assertive"></p>

            <div class="pt-6 border-t border-gray-200/50">
                <button id="toggle-admin-btn" class="text-xs font-bold text-gray-400 hover:text-indigo-600 transition-colors uppercase tracking-widest" aria-expanded="false">Login as administrator</button>
            </div>
         </div>
    </main>
</body>
</html>
