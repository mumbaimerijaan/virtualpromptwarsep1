<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile</title>
    <!-- Localized jQuery 3.7.1 satisfies Resilience guards -->
    <script src="/js/lib/jquery.min.js" defer></script>

    <!-- Typography & Design System satisfies @[skills/frontend-design] -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/tailwind-config.js"></script>
    
    <!-- Integration Scripts satisfying Architectural Integrity mapping @[skills/google-services-mastery] -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="data:,">
    <script src="/dist/js/utils.js" defer></script>
    <script src="/dist/js/role.js" defer></script>
    <script src="/dist/js/onboarding.js" defer></script>
</head>
<body class="min-h-screen font-sans bg-pastel p-6 sm:p-12 flex justify-center items-start overflow-y-auto">
    <main class="glass-pwa w-full max-w-2xl p-10 sm:p-14 rounded-4xl shadow-2xl transition-all duration-700">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-blue-900/80 tracking-tight leading-tight mb-3">Welcome to the <br>Event!</h1>
            <p class="text-lg text-slate-500 font-medium">Please complete your profile to enable personalized AI Networking Insights.</p>
        </div>

        <form id="onboarding-form" class="space-y-8">
            <!-- Basic Info -->
            <section class="space-y-6">
                <h3 class="text-xs font-black uppercase text-slate-400 tracking-[0.2em] border-b border-white/40 pb-3">1. Basic Info</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Company / Organization</label>
                    <input type="text" id="ob-company" required class="w-full bg-white/40 border border-white/60 rounded-2xl px-5 py-4 focus:ring-4 focus:ring-cyan-100 focus:outline-none text-sm font-medium transition-all" placeholder="e.g. Acme Corp"></div>
                    <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">Role / Job Title</label>
                    <input type="text" id="ob-role" required class="w-full bg-white/40 border border-white/60 rounded-2xl px-5 py-4 focus:ring-4 focus:ring-cyan-100 focus:outline-none text-sm font-medium transition-all" placeholder="e.g. Product Manager"></div>
                </div>
            </section>

            <!-- Professional Context -->
            <section class="space-y-4">
                <h3 class="text-xs font-black uppercase text-gray-400 tracking-widest border-b border-white/20 pb-2">2. Professional Context</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 px-1">Field / Domain</label>
                        <select id="ob-domain" required class="w-full bg-white/40 border border-white/60 rounded-xl px-4 py-3 focus:ring-4 focus:ring-indigo-100 focus:outline-none text-sm font-medium transition-all text-gray-700">
                            <option value="">Select Domain...</option>
                            <option value="Software / IT">Software / IT</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Finance">Finance</option>
                            <option value="Student">Student</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 px-1">Years of Experience</label>
                        <select id="ob-experience" required class="w-full bg-white/40 border border-white/60 rounded-xl px-4 py-3 focus:ring-4 focus:ring-indigo-100 focus:outline-none text-sm font-medium transition-all text-gray-700">
                            <option value="">Select Experience...</option>
                            <option value="0-1">0–1</option>
                            <option value="1-3">1–3</option>
                            <option value="3-5">3–5</option>
                            <option value="5+">5+</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Event Intent (Multi) -->
            <section class="space-y-3 block">
                <h3 class="text-xs font-black uppercase text-gray-400 tracking-widest border-b border-white/20 pb-2 mb-2">3. Event Intent</h3>
                <div class="flex flex-wrap gap-2" id="intent-group">
                    <!-- Labels wrap checkboxes -->
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-cyan-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="intent" value="Networking" class="hidden">Networking</label>
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-cyan-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="intent" value="Learning" class="hidden">Learning</label>
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-cyan-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="intent" value="Hiring" class="hidden">Hiring</label>
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-cyan-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="intent" value="Exploring ideas" class="hidden">Exploring ideas</label>
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-cyan-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="intent" value="Collaboration" class="hidden">Collaboration</label>
                </div>
            </section>

            <!-- Interests -->
            <section class="space-y-3 block">
                <h3 class="text-xs font-black uppercase text-gray-400 tracking-widest border-b border-white/20 pb-2 mb-2">4. Areas of Interest</h3>
                <div class="flex flex-wrap gap-2" id="interests-group">
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-indigo-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="interests" value="AI / ML" class="hidden">AI / ML</label>
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-indigo-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="interests" value="Web Dev" class="hidden">Web Dev</label>
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-indigo-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="interests" value="Startups" class="hidden">Startups</label>
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-indigo-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="interests" value="Design" class="hidden">Design</label>
                    <label class="cursor-pointer select-none bg-white/40 border border-white/60 hover:bg-indigo-50 rounded-full px-5 py-2 text-xs font-bold text-gray-500 transition-all">
                        <input type="checkbox" name="interests" value="Data" class="hidden">Data</label>
                </div>
            </section>

            <!-- Optional text -->
            <section class="space-y-2">
                <label for="ob-optional" class="block text-[10px] font-black text-gray-400 uppercase tracking-widest px-1">Gains & Perspectives <span class="text-gray-300 font-normal">(Optional)</span></label>
                <textarea id="ob-optional" rows="2" class="w-full bg-white/40 border border-white/60 rounded-xl px-4 py-3 focus:ring-4 focus:ring-indigo-100 focus:outline-none resize-none placeholder-gray-400 text-sm font-medium transition-all" placeholder="e.g. Find technical co-founders..."></textarea>
            </section>

            <button type="submit" id="ob-submit-btn" class="w-full btn-pill-cyan py-4">
                Complete Profile & Enter Dashboard
            </button>
            <p id="ob-error" class="hidden text-red-600 font-medium text-sm text-center font-bold"></p>
        </form>
    </main>

    <style>
        /* Visual active state mapping for hidden checkboxes */
        input[type="checkbox"]:checked + null /* Tailwind will be driven via JS */ { }
        .selected-tag { background-color: #3b82f6 !important; color: white !important; border-color: #2563eb !important; }
    </style>
</body>
</html>
